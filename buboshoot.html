<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe 手指切泡泡遊戲 - 修復版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { transform: scaleX(-1); display: none; } 
        canvas { transform: scaleX(-1); border-radius: 10px; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10; }
        h1 { margin: 0; font-size: 24px; }
        .score { font-size: 40px; color: #ffeb3b; }
    </style>
</head>
<body>

<div id="container">
    <div id="ui">
        <h1>手指切泡泡</h1>
        <div class="score">得分: <span id="scoreVal">0</span></div>
    </div>
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');

    let score = 0;
    let bubble = { x: 0.5, y: 0.5, r: 40, color: '#00d2ff' };

    function initCanvas() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.onresize = initCanvas;
    initCanvas();

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. 繪製鏡頭影像
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        // 2. 繪製泡泡
        canvasCtx.beginPath();
        canvasCtx.arc(bubble.x * canvasElement.width, bubble.y * canvasElement.height, bubble.r, 0, 2 * Math.PI);
        canvasCtx.fillStyle = bubble.color;
        canvasCtx.fill();
        canvasCtx.strokeStyle = "white";
        canvasCtx.lineWidth = 3;
        canvasCtx.stroke();

        // 3. 偵測手部
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // 畫出骨架以便視覺化確認
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
                
                // 取得食指尖 (Index Finger Tip is Landmark 8)
                const tip = landmarks[8];
                const tx = tip.x * canvasElement.width;
                const ty = tip.y * canvasElement.height;

                // 碰撞檢查
                const bx = bubble.x * canvasElement.width;
                const by = bubble.y * canvasElement.height;
                const dist = Math.hypot(tx - bx, ty - by);

                if (dist < bubble.r + 10) {
                    score += 10;
                    scoreElement.innerText = score;
                    respawnBubble();
                }
            }
        }
        canvasCtx.restore();
    }

    function respawnBubble() {
        bubble.x = Math.random() * 0.8 + 0.1;
        bubble.y = Math.random() * 0.8 + 0.1;
        bubble.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
    }

    // 修復初始化邏輯與路徑
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1, // 0 為輕量(快), 1 為平衡
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>
</body>
</html>
