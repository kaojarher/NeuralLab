<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 指尖打靶模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { transform: scaleX(-1); display: none; }
        canvas { transform: scaleX(-1); border: 4px solid #444; border-radius: 15px; background: #000; cursor: none; }
        #ui-overlay { position: absolute; top: 30px; left: 30px; color: #00ff00; pointer-events: none; z-index: 100; }
        .stat { font-size: 1.5rem; margin-bottom: 5px; font-family: monospace; }
        .score { font-size: 3rem; color: #ffeb3b; }
        #crosshair-info { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <div class="stat">MODE: SPACE SHOOTING</div>
        <div class="stat score">SCORE: <span id="scoreVal">0</span></div>
        <div id="status" class="stat" style="color: #00ffff;">READY...</div>
    </div>
    
    <div id="crosshair-info">提示：將食指與大拇指「捏合」即可射擊</div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('scoreVal');
    const statusElement = document.getElementById('status');

    let score = 0;
    let isPinching = false;
    let canShoot = true; // 用於控制射擊冷卻
    let target = { x: 0.5, y: 0.5, size: 50 };
    let lastShotTime = 0;

    function initCanvas() {
        canvasElement.width = window.innerWidth * 0.95;
        canvasElement.height = window.innerHeight * 0.9;
    }
    window.onresize = initCanvas;
    initCanvas();

    function drawTarget(ctx, x, y, size) {
        // 繪製傳統靶心
        const colors = ['#ffffff', '#ffffff', '#000000', '#000000', '#4169e1', '#4169e1', '#ff4444', '#ff4444', '#ffd700'];
        for (let i = 0; i < 9; i++) {
            ctx.beginPath();
            ctx.arc(x, y, size * (1 - i * 0.1), 0, 2 * Math.PI);
            ctx.fillStyle = colors[i];
            ctx.fill();
            ctx.strokeStyle = "#888";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    }

    function onResults(results) {
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // 1. 繪製背景影像
        canvasCtx.globalAlpha = 0.6; // 背景稍暗，突顯遊戲元素
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.globalAlpha = 1.0;

        // 2. 繪製靶標
        drawTarget(canvasCtx, target.x * canvasElement.width, target.y * canvasElement.height, target.size);

        // 3. 處理手部偵測
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmarks = results.multiHandLandmarks[0];
            
            // 取得大拇指尖 (4) 與 食指尖 (8)
            const thumb = landmarks[4];
            const index = landmarks[8];
            
            const ix = index.x * canvasElement.width;
            const iy = index.y * canvasElement.height;
            const tx = thumb.x * canvasElement.width;
            const ty = thumb.y * canvasElement.height;

            // 計算兩指距離（正規化距離）
            const pinchDist = Math.hypot(index.x - thumb.x, index.y - thumb.y, index.z - thumb.z);
            
            // 4. 繪製準心 (食指尖)
            canvasCtx.beginPath();
            canvasCtx.arc(ix, iy, 15, 0, 2 * Math.PI);
            canvasCtx.strokeStyle = (pinchDist < 0.05) ? "#ff0000" : "#00ff00";
            canvasCtx.lineWidth = 3;
            canvasCtx.stroke();
            // 準心十字
            canvasCtx.moveTo(ix - 20, iy); canvasCtx.lineTo(ix + 20, iy);
            canvasCtx.moveTo(ix, iy - 20); canvasCtx.lineTo(ix, iy + 20);
            canvasCtx.stroke();

            // 5. 射擊邏輯 (捏合判定)
            if (pinchDist < 0.05) { // 閥值 0.05
                if (canShoot) {
                    performShot(ix, iy);
                    canShoot = false;
                    statusElement.innerText = "FIRE!";
                    statusElement.style.color = "#ff4444";
                }
            } else {
                canShoot = true;
                statusElement.innerText = "READY";
                statusElement.style.color = "#00ff00";
            }
        }
        canvasCtx.restore();
    }

    function performShot(ix, iy) {
        const bx = target.x * canvasElement.width;
        const by = target.y * canvasElement.height;
        const dist = Math.hypot(ix - bx, iy - by);

        // 如果命中的距離在靶子範圍內
        if (dist < target.size) {
            // 計算分數：越中心越高分 (10~100)
            const hitScore = Math.max(10, Math.round((1 - dist / target.size) * 10) * 10);
            score += hitScore;
            scoreElement.innerText = score;
            
            // 命中特效與重置靶位
            target.size = 5; // 短暫縮小模擬擊碎
            setTimeout(respawnTarget, 200);
        }
    }

    function respawnTarget() {
        target.x = Math.random() * 0.7 + 0.15;
        target.y = Math.random() * 0.6 + 0.2;
        target.size = 50 + Math.random() * 30;
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.7, // 提高信心值以增加精確度
        minTrackingConfidence: 0.7
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });
    camera.start();
</script>
</body>
</html>
